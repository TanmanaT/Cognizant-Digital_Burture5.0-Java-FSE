<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 3: Responsive Grid Layout</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            color: #f8fafc;
            min-height: 100vh;
        }
        .grid-box {
            background: rgba(99, 102, 241, 0.1);
            border: 2px dashed rgba(99, 102, 241, 0.4);
            border-radius: 16px;
            padding: 2.5rem 1.5rem;
            transition: all 0.3s ease;
        }
        .grid-box:hover {
            background: rgba(99, 102, 241, 0.2);
            border-color: #6366f1;
            transform: translateY(-3px);
        }
        .text-muted {
            color: rgba(255, 255, 255, 0.7) !important;
        }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="d-flex justify-content-between align-items-center mb-5">
            <div>
                <span class="badge bg-primary px-3 py-2 rounded-pill mb-2">Exercise 3.1 & 3.2</span>
                <h1 class="h2 fw-bold text-white mb-0">Responsive Grid Layout</h1>
            </div>
            <a href="../index.html" class="btn btn-outline-light rounded-pill btn-sm px-3">Back to Dashboard</a>
        </div>

        <div class="row g-4">
            <!-- Column 1 -->
            <div class="col-12 col-md-6 col-lg-4">
                <div class="grid-box text-center">
                    <h3 class="h4 fw-bold text-white mb-2">Column 1</h3>
                    <p class="text-muted mb-0">
                        <code>.col-12</code> on Mobile<br>
                        <code>.col-md-6</code> on Tablet<br>
                        <code>.col-lg-4</code> on Desktop
                    </p>
                </div>
            </div>
            <!-- Column 2 -->
            <div class="col-12 col-md-6 col-lg-4">
                <div class="grid-box text-center">
                    <h3 class="h4 fw-bold text-white mb-2">Column 2</h3>
                    <p class="text-muted mb-0">
                        <code>.col-12</code> on Mobile<br>
                        <code>.col-md-6</code> on Tablet<br>
                        <code>.col-lg-4</code> on Desktop
                    </p>
                </div>
            </div>
            <!-- Column 3 -->
            <div class="col-12 col-md-12 col-lg-4">
                <div class="grid-box text-center">
                    <h3 class="h4 fw-bold text-white mb-2">Column 3</h3>
                    <p class="text-muted mb-0">
                        <code>.col-12</code> on Mobile<br>
                        <code>.col-md-12</code> on Tablet (Full row)<br>
                        <code>.col-lg-4</code> on Desktop
                    </p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
