<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 17: Bootstrap Icons</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons CSS via CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .icon-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 2rem;
        }
        .social-link {
            font-size: 1.5rem;
            color: rgba(255, 255, 255, 0.6);
            transition: color 0.2s ease, transform 0.2s;
        }
        .social-link:hover {
            color: #6366f1;
            transform: scale(1.1);
        }
    </style>
</head>
<body>
    <div class="container py-5 flex-grow-1">
        <div class="d-flex justify-content-between align-items-center mb-5">
            <div>
                <span class="badge bg-info text-dark px-3 py-2 rounded-pill mb-2">Exercise 17.1 & 17.2</span>
                <h1 class="h2 fw-bold text-white mb-0">Bootstrap Icons Integration</h1>
            </div>
            <a href="../index.html" class="btn btn-outline-light rounded-pill btn-sm px-3">Back to Dashboard</a>
        </div>

        <div class="row justify-content-center">
            <!-- Exercise 17.2: Icon-only buttons -->
            <div class="col-md-6">
                <div class="icon-card text-center">
                    <h2 class="h5 text-uppercase text-muted mb-4">Exercise 17.2: Icon-Only Toolbar Buttons</h2>
                    <p class="text-white-50 small mb-4">Using bootstrap vector icons inside interactive buttons with custom aria labels:</p>
                    <div class="d-flex justify-content-center gap-3">
                        <button class="btn btn-primary p-3 rounded-circle" aria-label="Play Video">
                            <i class="bi bi-play-fill fs-4 d-block"></i>
                        </button>
                        <button class="btn btn-secondary p-3 rounded-circle" aria-label="Settings">
                            <i class="bi bi-gear-fill fs-4 d-block"></i>
                        </button>
                        <button class="btn btn-danger p-3 rounded-circle" aria-label="Trash/Delete">
                            <i class="bi bi-trash-fill fs-4 d-block"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Exercise 17.1: Social icons in footer -->
    <footer class="bg-dark border-top border-secondary border-opacity-25 py-4 text-center">
        <div class="container">
            <h5 class="h6 text-muted mb-3">Exercise 17.1: Social Media Links</h5>
            <div class="d-flex justify-content-center gap-4">
                <a href="#" class="social-link" aria-label="Twitter X"><i class="bi bi-twitter-x"></i></a>
                <a href="#" class="social-link" aria-label="Github"><i class="bi bi-github"></i></a>
                <a href="#" class="social-link" aria-label="LinkedIn"><i class="bi bi-linkedin"></i></a>
                <a href="#" class="social-link" aria-label="Discord"><i class="bi bi-discord"></i></a>
            </div>
        </div>
    </footer>
</body>
</html>
