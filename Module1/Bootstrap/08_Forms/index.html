<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 8: Bootstrap Forms</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            color: #f8fafc;
            min-height: 100vh;
        }
        .form-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            padding: 2.5rem;
        }
        .form-control, .form-select {
            background-color: rgba(255, 255, 255, 0.05) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            color: #fff !important;
        }
        .form-control:focus, .form-select:focus {
            background-color: rgba(255, 255, 255, 0.08) !important;
            border-color: #6366f1 !important;
            box-shadow: 0 0 0 0.25rem rgba(99, 102, 241, 0.25) !important;
        }
        .form-floating label {
            color: rgba(255, 255, 255, 0.5);
        }
        .form-floating > .form-control:focus ~ label,
        .form-floating > .form-control:not(:placeholder-shown) ~ label {
            color: #818cf8;
        }
        .input-group-text {
            background-color: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.8);
        }
        /* Make form placeholders white and visible */
        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.5) !important;
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="d-flex justify-content-between align-items-center mb-5">
            <div>
                <span class="badge bg-success px-3 py-2 rounded-pill mb-2">Exercise 8.1 & 8.2</span>
                <h1 class="h2 fw-bold text-white mb-0">Bootstrap Forms</h1>
            </div>
            <a href="../index.html" class="btn btn-outline-light rounded-pill btn-sm px-3">Back to Dashboard</a>
        </div>

        <div class="row g-5">
            <!-- Exercise 8.1 -->
            <div class="col-lg-7">
                <div class="form-card h-100">
                    <h2 class="h4 fw-bold text-white mb-4">Exercise 8.1: Modern Registration Form</h2>
                    <form>
                        <div class="row g-3 mb-3">
                            <div class="col-sm-6">
                                <label class="form-label text-white-50">First Name</label>
                                <input type="text" class="form-control" placeholder="John" required>
                            </div>
                            <div class="col-sm-6">
                                <label class="form-label text-white-50">Last Name</label>
                                <input type="text" class="form-control" placeholder="Doe" required>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label text-white-50">Username</label>
                            <div class="input-group">
                                <span class="input-group-text">@</span>
                                <input type="text" class="form-control" placeholder="johndoe" required>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label text-white-50">Email Address</label>
                            <input type="email" class="form-control" placeholder="name@example.com" required>
                        </div>

                        <div class="mb-4">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="termsCheck">
                                <label class="form-check-label text-white-50" for="termsCheck">
                                    I agree to the terms and conditions
                                </label>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-primary w-100 rounded-pill py-2.5">Register Account</button>
                    </form>
                </div>
            </div>

            <!-- Exercise 8.2 -->
            <div class="col-lg-5">
                <div class="form-card h-100 d-flex flex-column justify-content-center">
                    <h2 class="h4 fw-bold text-white mb-4">Exercise 8.2: Floating Label Login</h2>
                    <form>
                        <div class="form-floating mb-3">
                            <input type="email" class="form-control" id="floatingEmail" placeholder="name@example.com" required>
                            <label for="floatingEmail">Email Address</label>
                        </div>
                        <div class="form-floating mb-4">
                            <input type="password" class="form-control" id="floatingPassword" placeholder="Password" required>
                            <label for="floatingPassword">Password</label>
                        </div>
                        <button type="submit" class="btn btn-success w-100 rounded-pill py-2.5">Sign In</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
